name: Auto merge Cursor report branches

on:
  push:
    branches:
      - 'cursor/product-hunt-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          existing_pr=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$existing_pr" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Auto report: $BRANCH" \
              --body "Auto-generated Product Hunt report from Cursor Automation."
          fi

      - name: Merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          pr_number=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$pr_number" ]; then
            gh pr merge "$pr_number" --squash --delete-branch
          fi
