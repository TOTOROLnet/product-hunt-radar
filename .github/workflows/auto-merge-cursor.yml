name: Sync Cursor report to main

on:
  push:
    branches:
      - 'cursor/product-hunt-*'

permissions:
  contents: write

concurrency:
  group: sync-report-main
  cancel-in-progress: false

jobs:
  sync-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cursor branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: cursor-src

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Copy reports to main
        run: |
          mkdir -p main-repo/reports
          cp -R cursor-src/reports/*.md main-repo/reports/ 2>/dev/null || true

      - name: Commit and push to main
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          cd main-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports

          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi

          git commit -m "Add Product Hunt report from $BRANCH"
          git push origin main

      - name: Delete Cursor branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          cd main-repo
          git push origin --delete "$BRANCH" || true
